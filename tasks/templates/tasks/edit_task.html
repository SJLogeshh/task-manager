<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
            margin: 0;
        }

        .container {
            width: 40%;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #574fd6;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #6c63ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Edit Task</h2>

    <form method="POST">
        {% csrf_token %}
        <!-- TASK TITLE -->
        <label>Task Title</label>
        <input type="text"
                name="title"
                value="{{ task.title }}"
                class="form-control mb-2">

        <!-- CATEGORY -->
        <label>Category</label>
        <input type="text" name="category" value="{{ task.category }}">

        <!-- DUE DATE -->
        <label>Due Date</label>
        <input type="date"
               name="due_date"
               value="{{ task.due_date|date:'Y-m-d' }}">

        <button type="submit">Update Task</button>
    </form>

    <a href="{% url 'home' %}" class="back">← Back to Home</a>
</div>

</body>
</html>
