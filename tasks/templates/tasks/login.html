<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .image img {
            width: 350px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #7a8cff;
            box-shadow: 0 0 5px rgba(122,140,255,0.3);
        }

        button {
            padding: 10px 15px;
            background: #2d2f36;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1f2126;
        }

        p {
            margin-top: 15px;
            font-size: 14px;
        }

        a {
            color: #6c63ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .image img {
                width: 250px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Task Manager Illustration -->
    <div class="image">
        <img src="https://cdn-icons-png.flaticon.com/512/9068/9068670.png" alt="Task Manager">
    </div>

    <!-- Login Box -->
    <div class="box">
        <h2>Sign In</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>

</div>

</body>
</html>
