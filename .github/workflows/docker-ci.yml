name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🟢 Setup Python for testing
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # 🟢 Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 🟢 Run Django Tests
      - name: Run Tests
        run: |
          python manage.py test

      # 🔵 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔵 Build Docker Image
      - name: Build Docker Image
        run: docker build -t logeshsj/task-manager:latest .

      # 🔵 Push Docker Image
      - name: Push Docker Image
        run: docker push logeshsj/task-manager:latest

      # 🔴 Deploy to Azure (FORCE RESTART)
      - name: Restart Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: taskmanagementt
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'logeshsj/task-manager:latest'