name: CI/CD Pipeline - Django App

on:
  push:
    branches:
      - main

jobs:

  # 🟢 1. RUN UNIT TESTS
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          python manage.py test


  # 🔵 2. BUILD & PUSH DOCKER IMAGE
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t logeshsj/task-manager:latest .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push logeshsj/task-manager:latest


  # 🔴 3. DEPLOY TO AZURE WEB APP
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy Docker Image to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: taskmanagementt
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'logeshsj/task-manager:latest'


  # 🟣 4. DEPLOY TO AKS (KUBERNETES)
  deploy-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl rollout restart deployment task-manager